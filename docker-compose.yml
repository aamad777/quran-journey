services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: quran-journey:latest
    container_name: quran-journey
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - NODE_ENV=production
